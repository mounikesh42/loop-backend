services:
  - type: web
    name: loop-backend
    env: docker
    plan: free
    envVars:
      - key: LOOP_UPLOAD_ROOT
        value: /var/data/uploads
      - key: LOOP_JOBS_DB
        value: /var/data/jobs.db
      - key: LOOP_PIPELINE_DB
        value: /var/data/pipeline.db
      - key: LOOP_UPLOAD_RETENTION_DAYS
        value: "30"
      - key: LOOP_PIPELINE_TIMEOUT_SECONDS
        value: "1800"
      - key: SITE_REALITY_ASSET_BASE
        value: https://prodcrystalball.s3.amazonaws.com/site-reality/hyderabad-m7-2026-05-18
      - key: LOOP_S3_UPSTREAM
        value: https://prodcrystalball.s3.amazonaws.com
